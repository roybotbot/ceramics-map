name: Sync Studios from Google Sheets

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC
  workflow_dispatch:        # Manual trigger from the GitHub Actions UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Sync studios from sheet
        env:
          SHEET_URL: ${{ vars.SHEET_URL }}
        run: python3 scripts/sheets_to_json.py

      - name: Commit and push if studios.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add studios.json
          git diff --staged --quiet || git commit -m "chore: sync studios from Google Sheets"
          git push
