name: Validate studios.json

on:
  pull_request:
    paths:
      - studios.json

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run validation
        run: python3 scripts/validate.py
